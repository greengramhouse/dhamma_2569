<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบค้นหาข้อมูลธรรมศึกษา 69</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js"></script>
    <style>
      body {
        font-family: "Sarabun", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-3 shadow-lg">
      <div class="container mx-auto px-4 text-center">
        <h1 class="text-xl font-bold mb-2">ธรรมศึกษา 2568</h1>
      </div>
    </div>

    <div class="container mx-auto px-4 py-8">
      <!-- Splash Screen -->
      <div id="splashScreen" class="fixed inset-0 bg-blue-300 flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <img
          src="https://res.cloudinary.com/gukkghu/image/upload/v1646575846/gukkghu/%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%AD%E0%B8%AD%E0%B8%81%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%A1%E0%B8%B5%E0%B8%8A%E0%B8%B7%E0%B9%88%E0%B8%AD_aytvpq.png"
          alt="โลโก้"
          class="w-32 mb-6"
        />
        <h1 class="text-3xl font-bold text-blue-700">ยินดีต้อนรับ</h1>
      </div>

      <!-- เนื้อหาหน้าเว็บทั้งหมด -->
      <div id="mainContent" class="opacity-0 transition-opacity duration-500">
        
        <!-- Loading indicator -->
        <div id="loading" class="text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
          <p class="mt-2 text-gray-600">กำลังโหลดข้อมูล...</p>
        </div>

        <!-- Statistics Cards -->
        <div id="statsSection" class="hidden mb-2">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">สถิติข้อมูลการสอบธรรมศึกษา</h2>
          <div id="statsCards" class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-3">
            <!-- Stats cards will be populated here -->
          </div>
        </div>

        <div class="py-4">
          <button id="toggleSearchBtn" class="bg-blue-600 text-white px-4 py-2 rounded-full shadow hover:bg-blue-700 transition">
            🔍 ค้นหาข้อมูล
          </button>
        </div>

        <!-- Search Section -->
        <div id="searchSection" class="max-h-0 overflow-hidden bg-white rounded-xl shadow-lg p-6 mb-8 transition-all duration-300" style="opacity: 0; padding-top: 0; padding-bottom: 0;">
          <h2 class="text-2xl font-semibold text-gray-800 mb-6">ค้นหาข้อมูล</h2>

          <!-- Name/Surname Search -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">ค้นหาจากชื่อ-นามสกุล</label>
            <input type="text" id="nameSearch" placeholder="พิมพ์ชื่อหรือนามสกุล..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
          </div>

          <!-- Status Filter Buttons -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-3">กรองตามสถานะ</label>
            <div id="statusButtons" class="flex flex-wrap gap-2">
              <button onclick="filterByStatus('all', this)" class="status-btn active px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-blue-600 text-white">
                📋 ทั้งหมด
              </button>
              <button onclick="filterByStatus('ตรี', this)" class="status-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-blue-100">
                🥉 ตรี
              </button>
              <button onclick="filterByStatus('โท', this)" class="status-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-blue-100">
                🥈 โท
              </button>
              <button onclick="filterByStatus('เอก', this)" class="status-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-blue-100">
                🥇 เอก
              </button>
              <button onclick="filterByStatus('ไม่มีรายชื่อสอบ', this)" class="status-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-blue-100">
                🚫 ไม่มีรายชื่อสอบ
              </button>
              <button onclick="filterByStatus('สำเร็จนักธรรมเอกไปแล้ว', this)" class="status-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-blue-100">
                ✅ สำเร็จนักธรรมเอกไปแล้ว
              </button>
            </div>
          </div>

          <!-- Classroom Dropdown -->
          <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-4">เลือกห้องเรียน</label>
            <select id="classroomSelect" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              <option value="">เลือกห้องเรียน</option>
              <option value="ป.4">ป.4</option>
              <option value="ป.5">ป.5</option>
              <option value="ป.6">ป.6</option>
              <option value="ม.1/1">ม.1/1</option>
              <option value="ม.1/2">ม.1/2</option>
              <option value="ม.2">ม.2</option>
              <option value="ม.3">ม.3</option>
            </select>
          </div>
        </div>

        <!-- Classroom Table Results -->
        <div id="classroomResults" class="hidden bg-white rounded-xl shadow-lg p-6 mb-8">
          <div class="flex justify-end items-center mb-4 gap-2">
            <button id="printClassroomBtn" onclick="printClassroomTable()" class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
              🖨️ พิมพ์รายชื่อ
            </button>
            <button id="printPdfBtn" onclick="printPdfClassroom()" class="hidden bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
              📄 พิมพ์ PDF
            </button>
          </div>

          <div class="overflow-x-auto" id="classroomTableWrapper">
            <table class="w-full table-auto" id="classroomTable">
              <thead>
                <tr class="bg-blue-50">
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">ลำดับ</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">เพศ</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">ชื่อ</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">นามสกุล</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">ห้องเรียน</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">สถานะ</th>
                  <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">ผลสอบ</th>
                </tr>
              </thead>
              <tbody id="classroomTableBody">
                <!-- Table rows will be populated here -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Search Results Cards -->
        <div id="searchResults" class="hidden">
          <h3 class="text-xl font-semibold text-gray-800 mb-4">ผลการค้นหา</h3>
          <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Result cards will be populated here -->
          </div>
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="hidden text-center py-8">
          <div class="text-gray-500 text-lg">ไม่พบข้อมูลที่ค้นหา</div>
        </div>
      </div>
    </div>

    <!-- ปุ่มลอยกลับไปบนสุด -->
    <button id="scrollToTopBtn" title="กลับไปบนสุด" class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition-opacity opacity-0 pointer-events-none" style="z-index: 1000">
      ⬆️
    </button>

    <script>
      let allData = [];
      let currentFilter = "all";

      // Fetch data from API
      async function fetchData() {
        try {
          const response = await fetch("https://opensheet.elk.sh/1KJ9U3ImzEG8--cIbn_BiACQPfJzrGz3vxbIfBjBYTug/data");
          const data = await response.json();
          allData = data;

          document.getElementById("loading").classList.add("hidden");
          document.getElementById("statsSection").classList.remove("hidden");
          document.getElementById("searchSection").classList.remove("hidden");

          generateStats();
          setupEventListeners();
        } catch (error) {
          console.error("Error fetching data:", error);
          document.getElementById("loading").innerHTML = '<p class="text-red-600">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
        }
      }

      // Generate statistics cards
      function generateStats() {
        const stats = {
          'ตรี': 0,
          'โท': 0,
          'เอก': 0,
          'ไม่มีรายชื่อสอบ': 0,
          'สำเร็จนักธรรมเอกไปแล้ว': 0,
        };

        allData.forEach((item) => {
          const status = (item.statust_test || "").trim();
          if (stats.hasOwnProperty(status)) {
            stats[status]++;
          }
        });

        const colors = {
          'ตรี': "bg-green-500",
          'โท': "bg-blue-500",
          'เอก': "bg-amber-600",
          'ไม่มีรายชื่อสอบ': "bg-gray-500",
          'สำเร็จนักธรรมเอกไปแล้ว': "bg-yellow-500",
          'รวมทั้งหมด': "bg-purple-600",
        };

        const statsContainer = document.getElementById("statsCards");
        statsContainer.innerHTML = "";

        const totalCount = stats['ตรี'] + stats['โท'] + stats['เอก'];

        const totalCard = document.createElement("div");
        totalCard.className = "bg-white rounded-lg shadow-md p-4 text-center";
        totalCard.innerHTML = `
        <div class="w-12 h-12 ${colors['รวมทั้งหมด']} rounded-full mx-auto mb-2 flex items-center justify-center">
            <span class="text-white font-bold text-lg">${totalCount}</span>
        </div>
        <h3 class="font-semibold text-gray-800 text-sm">รวม ตรี, โท, เอก</h3>`;
        statsContainer.appendChild(totalCard);

        Object.entries(stats).forEach(([status, count]) => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-lg shadow-md p-4 text-center";
          card.innerHTML = `
              <div class="w-12 h-12 ${colors[status]} rounded-full mx-auto mb-2 flex items-center justify-center">
                  <span class="text-white font-bold text-lg">${count}</span>
              </div>
              <h3 class="font-semibold text-gray-800 text-sm">${status}</h3>`;
          statsContainer.appendChild(card);
        });
      }

      // Setup event listeners
      function setupEventListeners() {
        document.getElementById("nameSearch").addEventListener("input", function (e) {
          const searchTerm = e.target.value.toLowerCase();
          if (searchTerm.length > 0) {
            searchByName(searchTerm);
          } else {
            hideResults();
          }
        });

        document.getElementById("classroomSelect").addEventListener("change", function (e) {
          const classroom = e.target.value;
          if (classroom) {
            searchByClassroom(classroom);
          } else {
            hideClassroomResults();
          }
        });
      }

      // Filter by status (รองรับ this element)
      function filterByStatus(status, btnElement) {
        currentFilter = status;

        // Update button styles
        document.querySelectorAll(".status-btn").forEach((btn) => {
          btn.classList.remove("active", "bg-blue-600", "text-white");
          btn.classList.add("bg-gray-200", "text-gray-700");
        });
        if(btnElement) {
          btnElement.classList.add("active", "bg-blue-600", "text-white");
          btnElement.classList.remove("bg-gray-200", "text-gray-700");
        }

        hideClassroomResults();

        const nameSearch = document.getElementById("nameSearch").value.toLowerCase();
        if (nameSearch.length > 0) {
          searchByName(nameSearch);
        } else if (status === "all") {
          displaySearchResults(allData);
        } else {
          const filtered = allData.filter((item) => (item.statust_test || "").trim() === status);
          displaySearchResults(filtered);
        }
      }

      function normalizeThai(text) {
        return text ? text.toString().trim().replace(/\s+/g, "") : "";
      }

      function searchByName(searchTerm) {
        const normalizedSearch = normalizeThai(searchTerm);
        let filtered = allData.filter(
          (item) =>
            normalizeThai(item.name).includes(normalizedSearch) ||
            normalizeThai(item.surname).includes(normalizedSearch)
        );

        if (currentFilter !== "all") {
          filtered = filtered.filter((item) => (item.statust_test || "").trim() === currentFilter);
        }
        displaySearchResults(filtered);
        hideClassroomResults();
      }

      function searchByClassroom(classroom) {
        const filtered = allData.filter((item) => item.classroom === classroom);
        displayClassroomResults(filtered, classroom);
        hideResults();
      }

      // Display search results as cards
      function displaySearchResults(results) {
        const container = document.getElementById("resultsContainer");
        const resultsSection = document.getElementById("searchResults");
        const noResults = document.getElementById("noResults");

        if (results.length === 0) {
          resultsSection.classList.add("hidden");
          noResults.classList.remove("hidden");
          return;
        }

        noResults.classList.add("hidden");
        resultsSection.classList.remove("hidden");
        container.innerHTML = "";

        results.forEach((item) => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow duration-200";

          const statusString = (item.statust_test || "").trim();
          const isCompleted = statusString.includes("สำเร็จ");
          const hasExamRight = String(item.test).toUpperCase() === "TRUE"; // รองรับเคสสตริง "TRUE" หรือบูลีน

          const genderRaw = (item.gender || "").toString().toLowerCase();
          let genderEmoji = "⚧", genderIcon = "👤";
          if (genderRaw.includes("ช") || genderRaw.includes("นาย")) {
            genderEmoji = "♂️"; genderIcon = "🧑";
          } else if (genderRaw.includes("ห") || genderRaw.includes("นาง")) {
            genderEmoji = "♀️"; genderIcon = "👩";
          }

          const statusColor = {
            'ตรี': "bg-green-100 text-green-800",
            'โท': "bg-blue-100 text-blue-800",
            'เอก': "bg-amber-100 text-amber-800",
            'ไม่มีรายชื่อสอบ': "bg-gray-100 text-gray-800",
            'สำเร็จนักธรรมเอกไปแล้ว': "bg-yellow-100 text-yellow-800",
          }[statusString] || "bg-gray-100 text-gray-800";

          const examInfo = isCompleted
            ? '<p class="text-yellow-600 font-medium">🏆 ไม่ต้องสอบแล้ว</p>'
            : hasExamRight
            ? '<p class="text-green-600 font-medium">✓ มีสิทธิ์สอบ</p>'
            : '<p class="text-red-600 font-medium">✗ ไม่มีสิทธิ์สอบ</p>';

          let examResultInfo = "";
          switch ((item.resualt || "").trim()) {
            case "สอบผ่าน": examResultInfo = `<p class="text-green-700 font-medium">✓ สอบผ่าน</p>`; break;
            case "สอบไม่ผ่าน": examResultInfo = `<p class="text-red-700 font-medium">✗ สอบไม่ผ่าน</p>`; break;
            case "ไม่ได้เข้าสอบ": examResultInfo = `<p class="text-gray-500 font-medium">– ไม่ได้เข้าสอบ</p>`; break;
            case "รอผลสอบ": examResultInfo = `<p class="text-yellow-600 font-medium">⏳ รอผลสอบ</p>`; break;
            case "กำลังจะสอบ": examResultInfo = `<p class="text-blue-600 font-medium">🕒 กำลังจะสอบ</p>`; break;
          }

          card.innerHTML = `
            <div class="flex justify-between items-start mb-3">
              <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColor}">${statusString || "-"}</span>
              <span class="text-sm text-gray-500">${item.classroom || "-"}</span>
            </div>
            <div class="flex items-center gap-3 mb-2">
              <span class="inline-flex w-9 h-9 items-center justify-center rounded-full bg-indigo-50 text-indigo-600 text-xl">${genderIcon}</span>
              <h3 class="text-lg font-semibold text-gray-800 m-0">${item.name || "-"} ${item.surname || ""}</h3>
            </div>
            <div class="text-sm text-gray-600 space-y-2">
              <p class="flex items-center gap-2"><span class="inline-flex w-6 h-6 items-center justify-center text-lg">${genderEmoji}</span><span><span class="font-medium">เพศ:</span> ${item.gender || "-"}</span></p>
              <p class="flex items-center gap-2"><span class="inline-flex w-6 h-6 items-center justify-center text-lg">🎓</span><span><span class="font-medium">ระดับชั้น:</span> ${item.status_class || "-"}</span></p>
              ${examInfo}
              ${examResultInfo}
            </div>
          `;
          container.appendChild(card);
        });
      }

      let currentClassroomData = [];

      function displayClassroomResults(results, classroom) {
        const tableBody = document.getElementById("classroomTableBody");
        const resultsSection = document.getElementById("classroomResults");
        const noResults = document.getElementById("noResults");
        const printBtn = document.getElementById("printClassroomBtn");
        const printPdfBtn = document.getElementById("printPdfBtn");

        if (results.length === 0) {
          resultsSection.classList.add("hidden");
          noResults.classList.remove("hidden");
          printBtn.classList.add("hidden");
          printPdfBtn.classList.add("hidden");
          currentClassroomData = [];
          return;
        }

        noResults.classList.add("hidden");
        resultsSection.classList.remove("hidden");
        printBtn.classList.remove("hidden");
        printPdfBtn.classList.remove("hidden");
        tableBody.innerHTML = "";

        results.forEach((item, index) => {
          const row = document.createElement("tr");
          row.className = index % 2 === 0 ? "bg-white" : "bg-gray-50";

          const statusString = (item.statust_test || "").trim();
          const statusColor = {
            'ตรี': "bg-green-100 text-green-800",
            'โท': "bg-blue-100 text-blue-800",
            'เอก': "bg-amber-100 text-amber-800",
            'ไม่มีรายชื่อสอบ': "bg-gray-100 text-gray-800",
            'สำเร็จนักธรรมเอกไปแล้ว': "bg-yellow-100 text-yellow-800",
          }[statusString] || "bg-gray-100 text-gray-800";

          const resualtColor = {
            'รอผลสอบ': "bg-yellow-700 text-yellow-100",
            'กำลังจะสอบ': "bg-blue-700 text-blue-100",
            'สอบผ่าน': "bg-green-700 text-green-100",
            'สอบไม่ผ่าน': "bg-red-700 text-red-100",
            'ไม่ได้เข้าสอบ': "bg-gray-700 text-gray-100" // เพิ่มสถานะใหม่
          }[(item.resualt || "").trim()] || "bg-gray-700 text-gray-100";

          row.innerHTML = `
            <td class="px-4 py-3 text-xs text-gray-900">${index + 1}</td>
            <td class="px-4 py-3 text-xs text-gray-900">${item.gender || "-"}</td>
            <td class="px-4 py-3 text-xs text-gray-900">${item.name || "-"}</td>
            <td class="px-4 py-3 text-xs font-medium text-gray-900">${item.surname || ""}</td>
            <td class="px-4 py-3 text-xs text-gray-900">${item.classroom || "-"}</td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-medium ${statusColor}">${statusString || "-"}</span></td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-medium ${resualtColor}">${item.resualt || "-"}</span></td>
          `;
          tableBody.appendChild(row);
        });
        currentClassroomData = results;
      }

      pdfMake.fonts = {
        THSarabunNew: {
          normal: "https://guykorat.github.io/font/THSarabunNew.ttf",
          bold: "https://guykorat.github.io/font/Sarabun-ExtraBold.ttf",
        },
        Charm: {
          normal: "https://guykorat.github.io/font/Charm-Bold.ttf",
          bold: "https://guykorat.github.io/font/Charm-Regular.ttf",
        },
        Prompt: {
          normal: "https://guykorat.github.io/font/Prompt-Regular.ttf",
          bold: "https://guykorat.github.io/font/Prompt-Bold.ttf",
        },
      };

      function printPdfClassroom() {
        if (!currentClassroomData.length) {
          alert("ไม่มีข้อมูลให้พิมพ์ PDF");
          return;
        }

        const body = [
          [
            { text: "ลำดับ", style: "tableHeader" },
            { text: "คำนำหน้า", style: "tableHeader" },
            { text: "ชื่อ", style: "tableHeader" },
            { text: "นามสกุล", style: "tableHeader" },
            { text: "ห้องเรียน", style: "tableHeader" },
            { text: "สถานะ", style: "tableHeader" },
            { text: "ผลสอบ", style: "tableHeader" }, // เพิ่ม Header ให้ตรงตาราง HTML
          ],
        ];

        currentClassroomData.forEach((item, index) => {
          body.push([
            index + 1,
            item.gender || "-",
            item.name || "-",
            item.surname || "-",
            item.classroom || "-",
            item.statust_test || "-",
            item.resualt || "-", // ส่งค่าผลสอบลง PDF
          ]);
        });

        const docDefinition = {
          content: [
            { text: "รายชื่อนักเรียนจากการค้นหาห้องเรียน", style: "header" },
            {
              style: "tableExample",
              table: {
                headerRows: 1,
                widths: ["auto", "auto", "*", "*", "auto", "auto", "auto"],
                body: body,
              },
              layout: {
                fillColor: function (rowIndex) {
                  if (rowIndex === 0) return "#CCCCCC";
                  const dataIndex = rowIndex - 1;
                  if (currentClassroomData[dataIndex] && currentClassroomData[dataIndex].statust_test === "ไม่มีรายชื่อสอบ") {
                    return "#f8d7da";
                  }
                  return null;
                },
              },
            },
          ],
          defaultStyle: { font: "THSarabunNew", fontSize: 16 },
          styles: {
            header: { fontSize: 20, bold: true, marginBottom: 15 },
            tableExample: { margin: [0, 5, 0, 15] },
            tableHeader: { bold: true, fontSize: 12, color: "black" },
          },
          pageOrientation: "portrait",
          pageSize: "A4",
        };
        pdfMake.createPdf(docDefinition).open();
      }

      function printClassroomTable() {
        const printContents = document.getElementById("classroomTableWrapper").innerHTML;
        const originalContents = document.body.innerHTML;
        document.body.innerHTML = printContents;
        window.print();
        document.body.innerHTML = originalContents;
        window.location.reload();
      }

      function hideResults() {
        document.getElementById("searchResults").classList.add("hidden");
        document.getElementById("noResults").classList.add("hidden");
      }

      function hideClassroomResults() {
        document.getElementById("classroomResults").classList.add("hidden");
      }

      document.addEventListener("DOMContentLoaded", () => fetchData());

      const scrollToTopBtn = document.getElementById("scrollToTopBtn");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 100) {
          scrollToTopBtn.classList.remove("opacity-0", "pointer-events-none");
          scrollToTopBtn.classList.add("opacity-100", "pointer-events-auto");
        } else {
          scrollToTopBtn.classList.add("opacity-0", "pointer-events-none");
          scrollToTopBtn.classList.remove("opacity-100", "pointer-events-auto");
        }
      });

      scrollToTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

      const toggleBtn = document.getElementById("toggleSearchBtn");
      const searchSection = document.getElementById("searchSection");
      toggleBtn.addEventListener("click", () => {
        if (searchSection.style.maxHeight && searchSection.style.maxHeight !== "0px") {
          searchSection.style.maxHeight = "0";
          searchSection.style.opacity = "0";
          searchSection.style.paddingTop = "0";
          searchSection.style.paddingBottom = "0";
        } else {
          searchSection.style.maxHeight = searchSection.scrollHeight + "px";
          searchSection.style.opacity = "1";
          searchSection.style.paddingTop = "";
          searchSection.style.paddingBottom = "";
        }
      });

      window.addEventListener("load", () => {
        setTimeout(() => {
          const splash = document.getElementById("splashScreen");
          const main = document.getElementById("mainContent");
          splash.style.opacity = 0;
          splash.style.pointerEvents = "none";
          main.style.opacity = 1;
          setTimeout(() => { splash.style.display = "none"; }, 500);
        }, 2000);
      });
    </script>
  </body>
</html>
