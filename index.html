<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบข้อมูลธรรมศึกษา 69</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js"></script>
    <style>
      body { font-family: "Sarabun", sans-serif; background-color: #f8fafc; }
      /* ปรับแต่ง Scrollbar ของตาราง */
      .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
      .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
      .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      /* Sticky Table Header */
      th { position: sticky; top: 0; z-index: 10; }
    </style>
  </head>
  <body class="text-gray-800 antialiased">
    
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-xl shadow-md">
            ธรรม
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900 leading-tight">ระบบข้อมูลธรรมศึกษา</h1>
            <p class="text-xs text-gray-500">ปีการศึกษา 2568</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      
      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-200 border-t-blue-600 mb-4"></div>
        <p class="text-gray-500 font-medium">กำลังโหลดและเตรียมข้อมูล...</p>
      </div>

      <div id="mainContent" class="hidden opacity-0 transition-opacity duration-500">
        
        <!-- Stats Section -->
        <div id="statsCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-6">
          <!-- Stats generated by JS -->
        </div>

        <!-- Toolbar: Filters & Actions -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-col lg:flex-row gap-4 justify-between items-center z-20">
          
          <!-- Filters -->
          <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
            <div class="relative w-full sm:w-64">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
              <input type="text" id="nameSearch" placeholder="ค้นหา ชื่อ-นามสกุล..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm outline-none transition-shadow" />
            </div>
            
            <select id="classroomSelect" class="w-full sm:w-40 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm outline-none bg-white">
              <option value="">ทุกห้องเรียน</option>
              <option value="ป.4">ป.4</option>
              <option value="ป.5">ป.5</option>
              <option value="ป.6">ป.6</option>
              <option value="ม.1/1">ม.1/1</option>
              <option value="ม.1/2">ม.1/2</option>
              <option value="ม.2">ม.2</option>
              <option value="ม.3">ม.3</option>
            </select>

            <select id="statusSelect" class="w-full sm:w-48 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm outline-none bg-white">
              <option value="">ทุกสถานะ</option>
              <option value="ตรีประถม">ตรีประถม</option>
              <option value="ตรีมัธยม">ตรีมัธยม</option>
              <option value="โทประถม">โทประถม</option>
              <option value="โทมัธยม">โทมัธยม</option>
              <option value="เอกประถม">เอกประถม</option>
              <option value="เอกมัธยม">เอกมัธยม</option>
              <option value="ไม่มีรายชื่อสอบ">ไม่มีรายชื่อสอบ</option>
              <option value="สำเร็จนักธรรมเอกไปแล้ว">สำเร็จนักธรรมเอกไปแล้ว</option>
            </select>
          </div>

          <!-- Actions -->
          <div class="flex gap-2 w-full lg:w-auto justify-end">
            <button onclick="printTable()" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-gray-300">
              🖨️ พิมพ์
            </button>
            <button onclick="exportPDF()" class="flex items-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-red-200">
              📄 โหลด PDF
            </button>
          </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[600px]">
          <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-base font-semibold text-gray-800">รายชื่อนักเรียน <span id="recordCount" class="text-sm font-normal text-gray-500 ml-2">(0 รายการ)</span></h2>
          </div>
          
          <div class="table-container overflow-y-auto flex-grow" id="printableArea">
            <table class="w-full text-left text-sm text-gray-600 whitespace-nowrap">
              <thead class="bg-gray-50 text-xs uppercase font-semibold text-gray-500 border-b border-gray-200">
                <tr>
                  <th scope="col" class="px-6 py-4 w-16 text-center">ลำดับ</th>
                  <th scope="col" class="px-6 py-4">ชื่อ - นามสกุล</th>
                  <th scope="col" class="px-6 py-4">ห้องเรียน</th>
                  <th scope="col" class="px-6 py-4">ระดับชั้น</th>
                  <th scope="col" class="px-6 py-4">สถานะการสอบ</th>
                  <th scope="col" class="px-6 py-4">ผลสอบ</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-gray-100">
                <!-- Rows injected by JS -->
              </tbody>
            </table>
            
            <!-- No Results State -->
            <div id="noResults" class="hidden flex-col items-center justify-center py-16 text-gray-500">
              <div class="text-4xl mb-3">🔍</div>
              <p class="text-lg font-medium">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
              <p class="text-sm">ลองเปลี่ยนคำค้นหา หรือตัวกรองด้านบน</p>
            </div>
          </div>
        </div>

      </div>
    </main>

    <script>
      let allData = [];
      let currentFilteredData = [];

      // การตั้งค่าสีสถานะต่างๆ
      const statusColors = {
        'ตรีประถม': "bg-green-50 text-green-700 ring-green-600/20",
        'ตรีมัธยม': "bg-green-100 text-green-800 ring-green-600/30",
        'โทประถม': "bg-blue-50 text-blue-700 ring-blue-600/20",
        'โทมัธยม': "bg-blue-100 text-blue-800 ring-blue-600/30",
        'เอกประถม': "bg-amber-50 text-amber-700 ring-amber-600/20",
        'เอกมัธยม': "bg-amber-100 text-amber-800 ring-amber-600/30",
        'ไม่มีรายชื่อสอบ': "bg-gray-50 text-gray-600 ring-gray-500/20",
        'สำเร็จนักธรรมเอกไปแล้ว': "bg-yellow-50 text-yellow-800 ring-yellow-600/20",
      };

      const resultColors = {
        'สอบผ่าน': "text-green-600 bg-green-50",
        'สอบไม่ผ่าน': "text-red-600 bg-red-50",
        'ไม่ได้เข้าสอบ': "text-gray-500 bg-gray-50",
        'รอผลสอบ': "text-yellow-600 bg-yellow-50",
        'กำลังจะสอบ': "text-blue-600 bg-blue-50",
      };

      document.addEventListener("DOMContentLoaded", () => {
        fetchData();
        setupFilters();
      });

      async function fetchData() {
        try {
          const response = await fetch("https://opensheet.elk.sh/1KJ9U3ImzEG8--cIbn_BiACQPfJzrGz3vxbIfBjBYTug/data");
          allData = await response.json();
          currentFilteredData = [...allData]; // คัดลอกข้อมูลทั้งหมดเป็นค่าเริ่มต้น
          
          document.getElementById("loading").classList.add("hidden");
          const mainContent = document.getElementById("mainContent");
          mainContent.classList.remove("hidden");
          
          // trigger แอนิเมชัน Fade in
          setTimeout(() => {
            mainContent.classList.remove("opacity-0");
            mainContent.classList.add("opacity-100");
          }, 50);

          generateStats();
          renderTable(currentFilteredData);
        } catch (error) {
          console.error("Error fetching data:", error);
          document.getElementById("loading").innerHTML = '<p class="text-red-600 font-medium">❌ เกิดข้อผิดพลาดในการดึงข้อมูลจาก Google Sheets</p>';
        }
      }

      function generateStats() {
        const stats = {
          'ตรีประถม': 0, 'ตรีมัธยม': 0,
          'โทประถม': 0, 'โทมัธยม': 0,
          'เอกประถม': 0, 'เอกมัธยม': 0,
        };

        allData.forEach((item) => {
          const status = (item.statust_test || "").trim();
          if (stats.hasOwnProperty(status)) {
            stats[status]++;
          }
        });

        const statsContainer = document.getElementById("statsCards");
        statsContainer.innerHTML = "";
        
        const totalCount = Object.values(stats).reduce((a, b) => a + b, 0);

        // การ์ดรวมทั้งหมด
        statsContainer.appendChild(createStatCard("รวมผู้มีสิทธิ์สอบ", totalCount, "bg-indigo-600", "text-white"));

        // สร้างการ์ดแยกตามสถานะ
        const statConfig = [
          { label: 'ตรีประถม', count: stats['ตรีประถม'], bg: 'bg-green-500' },
          { label: 'ตรีมัธยม', count: stats['ตรีมัธยม'], bg: 'bg-green-600' },
          { label: 'โทประถม', count: stats['โทประถม'], bg: 'bg-blue-400' },
          { label: 'โทมัธยม', count: stats['โทมัธยม'], bg: 'bg-blue-600' },
          { label: 'เอกประถม', count: stats['เอกประถม'], bg: 'bg-amber-500' },
          { label: 'เอกมัธยม', count: stats['เอกมัธยม'], bg: 'bg-amber-600' },
        ];

        statConfig.forEach(stat => {
            if(stat.count > 0) { // แสดงเฉพาะสถานะที่มีคนสอบ
                statsContainer.appendChild(createStatCard(stat.label, stat.count, stat.bg, "text-white"));
            }
        });
      }

      function createStatCard(title, count, bgClass, textClass) {
        const div = document.createElement("div");
        div.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4";
        div.innerHTML = `
          <div class="w-12 h-12 rounded-full ${bgClass} ${textClass} flex items-center justify-center font-bold text-lg shrink-0 shadow-inner">
            ${count}
          </div>
          <div class="overflow-hidden">
            <p class="text-sm font-medium text-gray-500 truncate">${title}</p>
            <p class="text-xl font-bold text-gray-800">${count} <span class="text-xs font-normal text-gray-400">คน</span></p>
          </div>
        `;
        return div;
      }

      function setupFilters() {
        const searchInput = document.getElementById("nameSearch");
        const classSelect = document.getElementById("classroomSelect");
        const statusSelect = document.getElementById("statusSelect");

        const applyFilters = () => {
          const searchTerm = searchInput.value.toLowerCase().replace(/\s+/g, "");
          const classFilter = classSelect.value;
          const statusFilter = statusSelect.value;

          currentFilteredData = allData.filter(item => {
            const nameMatch = (item.name || "").replace(/\s+/g, "").includes(searchTerm) || 
                              (item.surname || "").replace(/\s+/g, "").includes(searchTerm);
            const classMatch = classFilter === "" || item.classroom === classFilter;
            const statusMatch = statusFilter === "" || (item.statust_test || "").trim() === statusFilter;
            
            return nameMatch && classMatch && statusMatch;
          });

          renderTable(currentFilteredData);
        };

        // ผูก Event listener
        searchInput.addEventListener("input", applyFilters);
        classSelect.addEventListener("change", applyFilters);
        statusSelect.addEventListener("change", applyFilters);
      }

      function renderTable(data) {
        const tbody = document.getElementById("tableBody");
        const noResults = document.getElementById("noResults");
        const recordCount = document.getElementById("recordCount");
        
        recordCount.textContent = `(${data.length} รายการ)`;
        tbody.innerHTML = "";

        if (data.length === 0) {
          noResults.classList.remove("hidden");
          noResults.classList.add("flex");
          return;
        }

        noResults.classList.add("hidden");
        noResults.classList.remove("flex");

        data.forEach((item, index) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-blue-50/50 transition-colors group";

          // ไอคอนเพศ
          const genderRaw = (item.gender || "").toString().toLowerCase();
          let genderIcon = "👤";
          if (genderRaw.includes("ช") || genderRaw.includes("นาย")) genderIcon = "🧑";
          else if (genderRaw.includes("ห") || genderRaw.includes("นาง")) genderIcon = "👩";

          // สีสถานะ
          const statusStr = (item.statust_test || "").trim();
          const badgeClass = statusColors[statusStr] || "bg-gray-100 text-gray-700 ring-gray-500/20";
          
          // สีผลสอบ
          const resultStr = (item.resualt || "").trim();
          const resultBadgeClass = resultColors[resultStr] || "text-gray-600 bg-gray-100";

          tr.innerHTML = `
            <td class="px-6 py-4 text-center font-medium text-gray-500">${index + 1}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <span class="text-xl bg-gray-100 p-1.5 rounded-full group-hover:bg-white transition-colors">${genderIcon}</span>
                <div>
                  <div class="font-medium text-gray-900">${item.gender || ""} ${item.name || "-"} ${item.surname || ""}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-gray-600">${item.classroom || "-"}</td>
            <td class="px-6 py-4 text-gray-600">${item.status_class || "-"}</td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 ring-inset ${badgeClass}">
                ${statusStr || "-"}
              </span>
            </td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ${resultBadgeClass}">
                ${resultStr || "-"}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // --- ฟังก์ชันการพิมพ์ และ PDF ---

      pdfMake.fonts = {
        THSarabunNew: {
          normal: "https://guykorat.github.io/font/THSarabunNew.ttf",
          bold: "https://guykorat.github.io/font/Sarabun-ExtraBold.ttf",
        }
      };

      function exportPDF() {
        if (currentFilteredData.length === 0) {
          alert("ไม่มีข้อมูลสำหรับสร้าง PDF กรุณาเปลี่ยนเงื่อนไขการค้นหา");
          return;
        }

        const body = [
          [
            { text: "ลำดับ", style: "tableHeader", alignment: 'center' },
            { text: "คำนำหน้า", style: "tableHeader" },
            { text: "ชื่อ - นามสกุล", style: "tableHeader" },
            { text: "ห้องเรียน", style: "tableHeader", alignment: 'center' },
            { text: "สถานะ", style: "tableHeader", alignment: 'center' },
            { text: "ผลสอบ", style: "tableHeader", alignment: 'center' }, 
          ],
        ];

        currentFilteredData.forEach((item, index) => {
          body.push([
            { text: index + 1, alignment: 'center' },
            item.gender || "-",
            `${item.name || ""} ${item.surname || ""}`,
            { text: item.classroom || "-", alignment: 'center' },
            { text: item.statust_test || "-", alignment: 'center' },
            { text: item.resualt || "-", alignment: 'center' },
          ]);
        });

        // ดึงเงื่อนไขมาแสดงในหัวกระดาษ PDF
        const classFilter = document.getElementById("classroomSelect").value || "ทั้งหมด";
        const statusFilter = document.getElementById("statusSelect").value || "ทั้งหมด";

        const docDefinition = {
          content: [
            { text: "รายงานรายชื่อนักเรียนสอบธรรมศึกษา", style: "header", alignment: 'center' },
            { text: `ห้องเรียน: ${classFilter} | สถานะการสอบ: ${statusFilter}`, style: "subheader", alignment: 'center', marginBottom: 10 },
            {
              style: "tableExample",
              table: {
                headerRows: 1,
                widths: ["auto", "auto", "*", "auto", "auto", "auto"],
                body: body,
              },
              layout: {
                fillColor: function (rowIndex) {
                  return (rowIndex === 0) ? '#f3f4f6' : null;
                }
              }
            },
          ],
          defaultStyle: { font: "THSarabunNew", fontSize: 14 },
          styles: {
            header: { fontSize: 20, bold: true, marginBottom: 5 },
            subheader: { fontSize: 14, color: '#4b5563' },
            tableExample: { margin: [0, 5, 0, 15] },
            tableHeader: { bold: true, fontSize: 14, color: "black", fillColor: '#e5e7eb' },
          },
          pageOrientation: "portrait",
          pageSize: "A4",
        };
        pdfMake.createPdf(docDefinition).open();
      }

      function printTable() {
        const printContent = document.getElementById("printableArea").innerHTML;
        const originalContent = document.body.innerHTML;

        // ใส่สไตล์เฉพาะตอน Print ให้ดูคลีน
        document.body.innerHTML = `
          <div style="font-family: 'Sarabun', sans-serif; padding: 20px;">
            <h2 style="text-align: center; margin-bottom: 20px;">รายชื่อนักเรียนสอบธรรมศึกษา</h2>
            ${printContent}
          </div>
        `;
        window.print();
        document.body.innerHTML = originalContent;
        window.location.reload(); // โหลดใหม่เพื่อคืนค่า Script event ต่างๆ
      }
    </script>
  </body>
</html>
