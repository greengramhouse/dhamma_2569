<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบข้อมูลธรรมศึกษา 69</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js"></script>
    <style>
      body { 
        font-family: "Sarabun", sans-serif; 
        background-color: #f3f4f6; /* สีพื้นหลังเว็บอ่อนๆ */
      }
      
      /* ทำให้ตอน Print ไม่แสดงส่วนที่ไม่จำเป็น */
      @media print {
        header, #toolbar, #statsCards { display: none !important; }
        body { background-color: white; }
        .print-shadow-none { box-shadow: none !important; border: none !important; }
      }
    </style>
  </head>
  <body class="text-gray-800 antialiased">
    
    <!-- Header (ยกเลิก Sticky เพื่อไม่ให้เกะกะตอนเลื่อนดูตาราง) -->
    <header class="bg-white border-b border-gray-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-2xl shadow-md">
            ธรรม
          </div>
          <div>
            <h1 class="text-2xl font-bold text-gray-900 leading-tight">ระบบข้อมูลธรรมศึกษา</h1>
            <p class="text-sm text-gray-500">ปีการศึกษา 2568</p>
          </div>
        </div>
        <div class="hidden sm:block">
           <span class="text-sm text-gray-500">ข้อมูลทั้งหมด <strong id="totalCountDisplay" class="text-blue-600">0</strong> รายการ</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      
      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center py-32">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-200 border-t-blue-600 mb-4"></div>
        <p class="text-gray-500 font-medium text-lg">กำลังโหลดและเตรียมข้อมูล...</p>
      </div>

      <div id="mainContent" class="hidden opacity-0 transition-opacity duration-500">
        
        <!-- Stats Section -->
        <div id="statsCards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
          <!-- Stats generated by JS -->
        </div>

        <!-- Toolbar: Filters & Actions -->
        <div id="toolbar" class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-6 flex flex-col lg:flex-row gap-4 justify-between items-center">
          
          <!-- Filters -->
          <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
            <div class="relative w-full sm:w-72">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
              <input type="text" id="nameSearch" placeholder="ค้นหา ชื่อ หรือ นามสกุล..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base outline-none transition-shadow" />
            </div>
            
            <select id="classroomSelect" class="w-full sm:w-48 px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 text-base outline-none bg-white">
              <option value="">ทุกห้องเรียน</option>
              <option value="ป.4">ป.4</option>
              <option value="ป.5">ป.5</option>
              <option value="ป.6">ป.6</option>
              <option value="ม.1/1">ม.1/1</option>
              <option value="ม.1/2">ม.1/2</option>
              <option value="ม.2">ม.2</option>
              <option value="ม.3">ม.3</option>
            </select>

            <select id="statusSelect" class="w-full sm:w-56 px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 text-base outline-none bg-white">
              <option value="">ทุกสถานะ</option>
              <option value="ตรีประถม">ตรีประถม</option>
              <option value="ตรีมัธยม">ตรีมัธยม</option>
              <option value="โทประถม">โทประถม</option>
              <option value="โทมัธยม">โทมัธยม</option>
              <option value="เอกประถม">เอกประถม</option>
              <option value="เอกมัธยม">เอกมัธยม</option>
              <option value="ไม่มีรายชื่อสอบ">ไม่มีรายชื่อสอบ</option>
              <option value="สำเร็จนักธรรมเอกไปแล้ว">สำเร็จนักธรรมเอกไปแล้ว</option>
            </select>
          </div>

          <!-- Actions -->
          <div class="flex gap-3 w-full lg:w-auto justify-end">
            <button onclick="printTable()" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-md text-sm font-medium transition-colors border border-gray-300 shadow-sm">
              🖨️ พิมพ์
            </button>
            <button onclick="exportPDF()" class="flex items-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 px-5 py-2 rounded-md text-sm font-medium transition-colors border border-red-200 shadow-sm">
              📄 โหลด PDF
            </button>
          </div>
        </div>

        <!-- Data Table (ปลดล็อกความสูง ใช้ Scroll ของหน้าเว็บแทน) -->
        <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-x-auto print-shadow-none" id="printableArea">
          <table class="w-full text-left text-sm text-gray-600 whitespace-nowrap min-w-[800px]">
            <thead>
              <!-- ใส่ bg-gray-100 แบบทึบที่ <tr> และ <th> เพื่อบังข้อความที่เลื่อนผ่าน -->
              <tr class="text-xs uppercase font-semibold text-gray-700 tracking-wide">
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 w-16 text-center shadow-sm">ลำดับ</th>
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 shadow-sm">ชื่อ - นามสกุล</th>
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 shadow-sm">ห้องเรียน</th>
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 shadow-sm">ระดับชั้น</th>
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 shadow-sm">สถานะการสอบ</th>
                <th scope="col" class="sticky top-0 z-10 bg-gray-100 px-6 py-4 border-b border-gray-200 shadow-sm">ผลสอบ</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-gray-100">
              <!-- Rows injected by JS -->
            </tbody>
          </table>
          
          <!-- No Results State -->
          <div id="noResults" class="hidden flex-col items-center justify-center py-20 text-gray-500 w-full">
            <div class="text-5xl mb-4 opacity-50">🔍</div>
            <p class="text-xl font-medium">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
            <p class="text-sm mt-1">ลองเปลี่ยนคำค้นหา หรือตัวกรองด้านบนใหม่</p>
          </div>
        </div>

      </div>
    </main>

    <script>
      let allData = [];
      let currentFilteredData = [];

      // การตั้งค่าสีสถานะต่างๆ
      const statusColors = {
        'ตรีประถม': "bg-green-50 text-green-700 ring-green-600/20",
        'ตรีมัธยม': "bg-green-100 text-green-800 ring-green-600/30",
        'โทประถม': "bg-blue-50 text-blue-700 ring-blue-600/20",
        'โทมัธยม': "bg-blue-100 text-blue-800 ring-blue-600/30",
        'เอกประถม': "bg-amber-50 text-amber-700 ring-amber-600/20",
        'เอกมัธยม': "bg-amber-100 text-amber-800 ring-amber-600/30",
        'ไม่มีรายชื่อสอบ': "bg-gray-50 text-gray-500 ring-gray-400/20",
        'สำเร็จนักธรรมเอกไปแล้ว': "bg-yellow-50 text-yellow-800 ring-yellow-600/20",
      };

      const resultColors = {
        'สอบผ่าน': "text-green-700 bg-green-50",
        'สอบไม่ผ่าน': "text-red-700 bg-red-50",
        'ไม่ได้เข้าสอบ': "text-gray-500 bg-gray-50",
        'รอผลสอบ': "text-yellow-700 bg-yellow-50",
        'กำลังจะสอบ': "text-blue-700 bg-blue-50",
      };

      document.addEventListener("DOMContentLoaded", () => {
        fetchData();
        setupFilters();
      });

      async function fetchData() {
        try {
          const response = await fetch("https://opensheet.elk.sh/1KJ9U3ImzEG8--cIbn_BiACQPfJzrGz3vxbIfBjBYTug/data");
          allData = await response.json();
          currentFilteredData = [...allData]; 
          
          document.getElementById("totalCountDisplay").textContent = allData.length;

          document.getElementById("loading").classList.add("hidden");
          const mainContent = document.getElementById("mainContent");
          mainContent.classList.remove("hidden");
          
          setTimeout(() => {
            mainContent.classList.remove("opacity-0");
            mainContent.classList.add("opacity-100");
          }, 50);

          generateStats();
          renderTable(currentFilteredData);
        } catch (error) {
          console.error("Error fetching data:", error);
          document.getElementById("loading").innerHTML = '<p class="text-red-600 font-medium">❌ เกิดข้อผิดพลาดในการดึงข้อมูลจาก Google Sheets</p>';
        }
      }

      function generateStats() {
        const stats = {
          'ตรีประถม': 0, 'ตรีมัธยม': 0,
          'โทประถม': 0, 'โทมัธยม': 0,
          'เอกประถม': 0, 'เอกมัธยม': 0,
        };

        allData.forEach((item) => {
          const status = (item.Current_Certify || "").trim();
          if (stats.hasOwnProperty(status)) {
            stats[status]++;
          }
        });

        const statsContainer = document.getElementById("statsCards");
        statsContainer.innerHTML = "";
        
        const statConfig = [
          { label: 'ตรีประถม', count: stats['ตรีประถม'], bg: 'bg-green-100', text: 'text-green-700' },
          { label: 'ตรีมัธยม', count: stats['ตรีมัธยม'], bg: 'bg-green-200', text: 'text-green-800' },
          { label: 'โทประถม', count: stats['โทประถม'], bg: 'bg-blue-100', text: 'text-blue-700' },
          { label: 'โทมัธยม', count: stats['โทมัธยม'], bg: 'bg-blue-200', text: 'text-blue-800' },
          { label: 'เอกประถม', count: stats['เอกประถม'], bg: 'bg-amber-100', text: 'text-amber-700' },
          { label: 'เอกมัธยม', count: stats['เอกมัธยม'], bg: 'bg-amber-200', text: 'text-amber-800' },
        ];

        statConfig.forEach(stat => {
            if(stat.count > 0) {
                statsContainer.appendChild(createStatCard(stat.label, stat.count, stat.bg, stat.text));
            }
        });
      }

      function createStatCard(title, count, bgClass, textClass) {
        const div = document.createElement("div");
        div.className = `p-4 rounded-lg shadow-sm border border-gray-200 bg-white flex flex-col justify-center items-center text-center transition hover:shadow-md`;
        div.innerHTML = `
          <p class="text-xs font-medium text-gray-500 mb-1">${title}</p>
          <div class="text-2xl font-bold ${textClass}">${count}</div>
        `;
        return div;
      }

      function setupFilters() {
        const searchInput = document.getElementById("nameSearch");
        const classSelect = document.getElementById("classroomSelect");
        const statusSelect = document.getElementById("statusSelect");

        const applyFilters = () => {
          const searchTerm = searchInput.value.toLowerCase().replace(/\s+/g, "");
          const classFilter = classSelect.value;
          const statusFilter = statusSelect.value;

          currentFilteredData = allData.filter(item => {
            const nameMatch = (item.name || "").replace(/\s+/g, "").includes(searchTerm) || 
                              (item.surname || "").replace(/\s+/g, "").includes(searchTerm);
            const classMatch = classFilter === "" || item.classroom === classFilter;
            const statusMatch = statusFilter === "" || (item.Current_Certify || "").trim() === statusFilter;
            
            return nameMatch && classMatch && statusMatch;
          });

          renderTable(currentFilteredData);
        };

        searchInput.addEventListener("input", applyFilters);
        classSelect.addEventListener("change", applyFilters);
        statusSelect.addEventListener("change", applyFilters);
      }

      function renderTable(data) {
        const tbody = document.getElementById("tableBody");
        const noResults = document.getElementById("noResults");
        
        tbody.innerHTML = "";

        if (data.length === 0) {
          noResults.classList.remove("hidden");
          noResults.classList.add("flex");
          return;
        }

        noResults.classList.add("hidden");
        noResults.classList.remove("flex");

        data.forEach((item, index) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-blue-50/40 transition-colors group";

          const genderRaw = (item.gender || "").toString().toLowerCase();
          let genderIcon = "👤";
          if (genderRaw.includes("ช") || genderRaw.includes("นาย")) genderIcon = "🧑";
          else if (genderRaw.includes("ห") || genderRaw.includes("นาง")) genderIcon = "👩";

          const statusStr = (item.Current_Certify || "").trim();
          const badgeClass = statusColors[statusStr] || "bg-gray-100 text-gray-600 ring-gray-400/20";
          
          const resultStr = (item.resualt || "").trim();
          const resultBadgeClass = resultColors[resultStr] || "text-gray-500 bg-gray-100";

          tr.innerHTML = `
            <td class="px-6 py-4 text-center font-medium text-gray-500">${index + 1}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <span class="text-xl bg-gray-100 p-1.5 rounded-full text-gray-500">${genderIcon}</span>
                <div>
                  <div class="font-medium text-gray-900">${item.gender || ""} ${item.name || "-"} ${item.surname || ""}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-gray-700">${item.classroom || "-"}</td>
            <td class="px-6 py-4 text-gray-700">${item.status_class || "-"}</td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 ring-inset ${badgeClass}">
                ${statusStr || "-"}
              </span>
            </td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ${resultBadgeClass}">
                ${resultStr || "-"}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // --- ฟังก์ชันการพิมพ์ และ PDF ---

      pdfMake.fonts = {
        THSarabunNew: {
          normal: "https://guykorat.github.io/font/THSarabunNew.ttf",
          bold: "https://guykorat.github.io/font/Sarabun-ExtraBold.ttf",
        }
      };

      function exportPDF() {
        if (currentFilteredData.length === 0) {
          alert("ไม่มีข้อมูลสำหรับสร้าง PDF กรุณาเปลี่ยนเงื่อนไขการค้นหา");
          return;
        }

        const body = [
          [
            { text: "ลำดับ", style: "tableHeader", alignment: 'center' },
            { text: "คำนำหน้า", style: "tableHeader" },
            { text: "ชื่อ - นามสกุล", style: "tableHeader" },
            { text: "ห้องเรียน", style: "tableHeader", alignment: 'center' },
            { text: "สถานะ", style: "tableHeader", alignment: 'center' },
            { text: "ผลสอบ", style: "tableHeader", alignment: 'center' }, 
          ],
        ];

        currentFilteredData.forEach((item, index) => {
          body.push([
            { text: index + 1, alignment: 'center' },
            item.gender || "-",
            `${item.name || ""} ${item.surname || ""}`,
            { text: item.classroom || "-", alignment: 'center' },
            { text: item.Current_Certify || "-", alignment: 'center' },
            { text: item.resualt || "-", alignment: 'center' },
          ]);
        });

        const classFilter = document.getElementById("classroomSelect").value || "ทั้งหมด";
        const statusFilter = document.getElementById("statusSelect").value || "ทั้งหมด";

        const docDefinition = {
          content: [
            { text: "รายงานรายชื่อนักเรียนสอบธรรมศึกษา", style: "header", alignment: 'center' },
            { text: `ห้องเรียน: ${classFilter} | สถานะการสอบ: ${statusFilter}`, style: "subheader", alignment: 'center', marginBottom: 10 },
            {
              style: "tableExample",
              table: {
                headerRows: 1,
                widths: ["auto", "auto", "*", "auto", "auto", "auto"],
                body: body,
              },
              layout: {
                fillColor: function (rowIndex) {
                  return (rowIndex === 0) ? '#f3f4f6' : null;
                }
              }
            },
          ],
          defaultStyle: { font: "THSarabunNew", fontSize: 14 },
          styles: {
            header: { fontSize: 20, bold: true, marginBottom: 5 },
            subheader: { fontSize: 14, color: '#4b5563' },
            tableExample: { margin: [0, 5, 0, 15] },
            tableHeader: { bold: true, fontSize: 14, color: "black", fillColor: '#e5e7eb' },
          },
          pageOrientation: "portrait",
          pageSize: "A4",
        };
        pdfMake.createPdf(docDefinition).open();
      }

      function printTable() {
        const printContent = document.getElementById("printableArea").innerHTML;
        const originalContent = document.body.innerHTML;

        document.body.innerHTML = `
          <div style="font-family: 'Sarabun', sans-serif; padding: 20px;">
            <h2 style="text-align: center; margin-bottom: 20px;">รายชื่อนักเรียนสอบธรรมศึกษา</h2>
            ${printContent}
          </div>
        `;
        window.print();
        document.body.innerHTML = originalContent;
        window.location.reload(); 
      }
    </script>
  </body>
</html>
